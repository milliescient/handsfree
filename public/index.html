<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>handsfree · Claude Code</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<style>
  :root {
    --bg: #0e0f13; --panel: #181a21; --border: #2a2d38;
    --text: #e8e9ee; --dim: #8a8fa3; --accent: #d97757; --ok: #5cbf8a; --err: #e06c75;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.5 system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  #dot { width: 10px; height: 10px; border-radius: 50%; background: var(--err); flex: none; }
  #dot.on { background: var(--ok); }
  #workdir { font-size: 12px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  header button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 13px;
  }

  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.queued { opacity: .55; position: relative; -webkit-user-select: none; user-select: none; }
  .msg.queued.q-edit { opacity: .9; }
  .queued-minus {
    position: absolute; top: -9px; left: -9px; width: 24px; height: 24px;
    border-radius: 50%; background: var(--err); color: #fff;
    font-weight: bold; font-size: 16px; line-height: 24px; text-align: center;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .claude { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .tool, .status { align-self: flex-start; font-size: 12px; color: var(--dim); padding: 0 4px; font-family: ui-monospace, monospace; }
  .error { align-self: flex-start; color: var(--err); font-size: 13px; padding: 0 4px; }
  .interim { align-self: flex-end; color: var(--dim); font-style: italic; padding: 0 4px; }
  #working { align-self: flex-start; color: var(--dim); font-size: 13px; padding: 2px 4px; display: flex; gap: 7px; align-items: center; }
  #working .spark { color: var(--accent); display: inline-block; animation: workingPulse 1.4s ease-in-out infinite; }
  @keyframes workingPulse {
    0%, 100% { opacity: .35; transform: scale(.9); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  footer { padding: 10px 16px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  #controls { position: relative; display: flex; align-items: center; justify-content: center; gap: 18px; }
  #mic {
    width: 78px; height: 78px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 32px;
    box-shadow: 0 4px 18px rgba(217, 119, 87, .35);
    transition: transform .15s;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #mic:active { transform: scale(.94); }
  #mic.listening { animation: pulse 1.2s infinite; }
  #mic.busy { background: var(--panel); border: 2px solid var(--accent); }
  #mic.locked { background: var(--panel); border: 2px solid var(--accent); color: var(--accent); }
  #mic svg, #lockHint svg { display: block; margin: auto; fill: currentColor; }
  #lockHint {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%; color: var(--dim);
    background: var(--panel); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    opacity: 0; pointer-events: none; transition: opacity .15s, transform .15s, border-color .15s;
  }
  #lockHint.show { opacity: 1; }
  #lockHint.near { border-color: var(--accent); color: var(--accent); transform: translateY(-50%) scale(1.2); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 119, 87, .5); }
    50% { box-shadow: 0 0 0 16px rgba(217, 119, 87, 0); }
  }
  #stop {
    width: 52px; height: 52px; border-radius: 50%; font-size: 18px;
    background: var(--panel); color: var(--err); border: 1px solid var(--border);
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  }
  #textRow { display: flex; gap: 8px; }
  #textInput {
    flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-size: 16px; outline: none;
  }
  #sendBtn { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 0 16px; }
  .session-btn { width: 100%; text-align: left; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; position: relative; }
  .session-btn:hover { border-color: var(--accent); }
  .session-btn .preview { color: var(--dim); font-size: 13px; margin-top: 4px; padding-right: 40px; }
  .session-btn .time { color: var(--dim); font-size: 11px; }
  .session-btn.new { border-color: var(--ok); color: var(--ok); }
  .session-btn .delete { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--err); font-size: 24px; padding: 12px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .session-btn .dir { color: var(--dim); font-size: 11px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sessionPicker input { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-bottom: 8px; outline: none; }
  #sessionPicker input:focus { border-color: var(--accent); }
  .host-btn { width: 100%; text-align: left; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; }
  .host-btn:hover { border-color: var(--accent); }
  .host-btn .url { color: var(--dim); font-size: 13px; margin-top: 4px; word-break: break-all; }
  .host-btn.add { border-color: var(--ok); color: var(--ok); }
  .host-btn .delete { float: right; color: var(--err); font-size: 18px; padding: 0 8px; }
  #hostPicker input { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-bottom: 8px; outline: none; }
  #hostPicker input:focus { border-color: var(--accent); }
  #navbar { display: flex; border-bottom: 1px solid var(--border); }
  #navbar button { flex: 1; background: var(--panel); color: var(--dim); border: none; padding: 12px 8px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
  #navbar button.active { color: var(--accent); border-bottom-color: var(--accent); }
  #navbar button:not(.active):hover { color: var(--text); }
</style>
</head>
<body>
<header>
  <div id="dot"></div>
  <div id="workdir">connecting…</div>
  <a id="apkBtn" href="handsfree.apk" download style="display:none;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;text-decoration:none;">📱 APK</a>
</header>

<nav id="navbar">
  <button id="navHosts">Servers</button>
  <button id="navSessions">Sessions</button>
  <button id="navChat" class="active">Chat</button>
</nav>

<div id="hostPicker" style="display:none; padding:16px;">
  <div style="color:var(--dim); margin-bottom:12px;">Connect to a server:</div>
  <div id="hostList"></div>
  <div id="addHostForm" style="display:none; margin-top:16px;">
    <input id="newHostName" placeholder="hostname or IP address" autocomplete="off">
    <input id="newHostPort" placeholder="port" value="8443" autocomplete="off" style="margin-top:0;">
    <div style="display:flex; gap:8px;">
      <button class="host-btn" id="saveHostBtn" style="flex:1; text-align:center;">Save</button>
      <button class="host-btn" id="cancelHostBtn" style="flex:1; text-align:center; color:var(--dim);">Cancel</button>
    </div>
  </div>
</div>
<div id="sessionPicker" style="display:none; padding:16px;">
  <div style="color:var(--dim); margin-bottom:12px;">Choose a session:</div>
  <div id="sessionList"></div>
</div>
<div id="log" style="display:none;"></div>

<footer>
  <div id="controls">
    <div id="lockHint"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h1.9c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg></div>
    <button id="mic" title="Hold to talk, slide up to lock hands-free"></button>
    <button id="stop" title="Interrupt">■</button>
  </div>
  <div id="textRow">
    <input id="textInput" placeholder="or type a message…" autocomplete="off">
    <button id="sendBtn">send</button>
  </div>
</footer>

<script>
const log = document.getElementById('log');
const dot = document.getElementById('dot');
const workdirEl = document.getElementById('workdir');
const micBtn = document.getElementById('mic');
const stopBtn = document.getElementById('stop');
const lockHint = document.getElementById('lockHint');
const textInput = document.getElementById('textInput');

let ws = null;
let listening = false;
let agentBusy = false;
let handsFree = false;
let interimEl = null;
// One timer per in-flight transcription (FIFO — responses arrive in order).
// A single shared slot orphaned the older timer when utterances overlapped,
// firing bogus "Transcription timed out" errors after successful replies.
let transcribeTimers = [];
let sessionChosen = false;
let currentSessionId = localStorage.getItem('handsfree_session') || null; // Persist across reloads
let currentCwd = null; // Working directory of the chosen session
let defaultWorkdir = ''; // Server default for new sessions (from hello)
let serverHostname = ''; // Server machine name (from hello), shown before the workdir
let cachedSessions = []; // Store sessions from server
function fmtWorkdir(dir) {
  return serverHostname ? serverHostname + ':' + dir : dir;
}
const sessionPicker = document.getElementById('sessionPicker');
const sessionList = document.getElementById('sessionList');
const hostPicker = document.getElementById('hostPicker');
const hostList = document.getElementById('hostList');
const navHosts = document.getElementById('navHosts');
const navSessions = document.getElementById('navSessions');
const navChat = document.getElementById('navChat');

function setNavActive(page) {
  navHosts.classList.remove('active');
  navSessions.classList.remove('active');
  navChat.classList.remove('active');
  if (page === 'hosts') navHosts.classList.add('active');
  else if (page === 'sessions') navSessions.classList.add('active');
  else navChat.classList.add('active');
}

let userOnSessionsPage = false; // Track if user explicitly navigated to sessions

// The mic/keyboard footer only makes sense on the chat view.
const footerEl = document.querySelector('footer');
function setFooterVisible(on) {
  footerEl.style.display = on ? 'flex' : 'none';
}

function showPage(page) {
  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'none';
  log.style.display = 'none';
  setFooterVisible(page === 'chat');
  setNavActive(page);
  userOnSessionsPage = (page === 'sessions');
  if (page === 'hosts') {
    showHostPicker();
  } else if (page === 'sessions') {
    // Reset lastSelectedSession so user can re-select the same session
    lastSelectedSession = null;
    // Use cached sessions (updated from hello message and after each session use)
    showSessionPicker(cachedSessions);
  } else {
    log.style.display = 'flex';
    scrollLog(); // scrollTop writes were no-ops while hidden
  }
}

// Host can come from URL (browser) or saved config (app)
let serverHost = location.host;

// Check if we're running in the app - Capacitor uses localhost or has the native bridge
const isApp = !location.host || location.protocol === 'file:' || location.host === 'localhost' || !!(window.Capacitor || window.AudioBridge);

// App version - git SHA, set by build-apk.sh
const APP_VERSION = '4fa54a5';
const CODE_VERSION = 'v2-delayed-bargein'; // Change this when updating VAD logic
console.log('Code version:', CODE_VERSION);

// Relay diagnostics to the server log — the phone's WebView console is
// invisible during hands-free use, so this is our only remote view.
function dbg(msg) {
  console.log(msg);
  try {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'debug', msg }));
  } catch (e) { /* never let logging break the app */ }
}
window.addEventListener('error', (e) => {
  dbg('[JSERROR] ' + e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
});
window.addEventListener('unhandledrejection', (e) => {
  dbg('[JSERROR] unhandled rejection: ' + (e.reason && (e.reason.message || e.reason)));
});

// Show APK download button in browser only
if (!isApp) {
  document.getElementById('apkBtn').style.display = 'block';
}

// Called from Android if update fails
window.onUpdateError = function(msg) {
  hideDownloadingOverlay();
  add('error', 'Update failed: ' + msg);
};

function hideDownloadingOverlay() {
  const overlay = document.getElementById('downloadOverlay');
  if (overlay) overlay.remove();
}

// Check for updates and prompt user. The app page stays alive across many
// deploys, so a one-shot boolean latch here silenced every deploy after the
// first "Later" tap. Track the version we prompted for instead: the same
// version never nags twice, but each NEW server version prompts again.
let promptedVersion = null;
function checkForUpdate(serverVersion) {
  if (!isApp) return;
  if (serverVersion === promptedVersion) return; // Don't prompt repeatedly
  // If versions differ and neither is unknown/dev, offer update
  if (serverVersion && APP_VERSION && serverVersion !== APP_VERSION &&
      serverVersion !== 'unknown' && APP_VERSION !== 'dev') {
    promptedVersion = serverVersion;
    showUpdateDialog(serverVersion);
  }
}

function showUpdateDialog(serverVersion) {
  const existing = document.getElementById('updateDialog');
  if (existing) existing.remove(); // replace a stale dialog from an older version
  const dialog = document.createElement('div');
  dialog.id = 'updateDialog';
  dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
  dialog.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:300px;text-align:center;">
      <div style="font-size:18px;margin-bottom:12px;">Update Available</div>
      <div style="color:var(--dim);margin-bottom:20px;">New version ${serverVersion}<br>You have ${APP_VERSION}</div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button id="updateNo" style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:14px;">Later</button>
        <button id="updateYes" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;">Update</button>
      </div>
    </div>
  `;
  document.body.appendChild(dialog);

  document.getElementById('updateNo').onclick = () => dialog.remove();
  document.getElementById('updateYes').onclick = () => {
    dialog.remove();
    if (window.AudioBridge && typeof window.AudioBridge.installUpdate === 'function') {
      const apkUrl = 'https://' + serverHost + '/handsfree.apk';
      showDownloadingOverlay();
      window.AudioBridge.installUpdate(apkUrl);
    }
  };
}

// Periodically check for updates (every 30 seconds)
setInterval(() => {
  if (!isApp || !serverHost) return;
  fetch('https://' + serverHost + '/version')
    .then(r => r.json())
    .then(data => { if (data.version) checkForUpdate(data.version); })
    .catch(() => {}); // Ignore errors
}, 30000);

// Show a fullscreen overlay while downloading update
function showDownloadingOverlay() {
  const overlay = document.createElement('div');
  overlay.id = 'downloadOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;';
  overlay.innerHTML = '<div style="font-size:24px;margin-bottom:16px;">Downloading update...</div><div style="color:var(--dim);">Please wait</div>';
  document.body.appendChild(overlay);
}

function loadHosts() {
  try { return JSON.parse(localStorage.getItem('handsfree_hosts') || '[]'); } catch { return []; }
}

function saveHosts(hosts) {
  localStorage.setItem('handsfree_hosts', JSON.stringify(hosts));
}

function showHostPicker() {
  const hosts = loadHosts();
  hostList.innerHTML = '';

  // Add new host button
  const addBtn = document.createElement('button');
  addBtn.className = 'host-btn add';
  addBtn.textContent = '+ Add new server';
  addBtn.onclick = () => {
    document.getElementById('addHostForm').style.display = 'block';
    document.getElementById('newHostUrl').focus();
  };
  hostList.appendChild(addBtn);

  // Existing hosts
  for (let i = 0; i < hosts.length; i++) {
    const h = hosts[i];
    const btn = document.createElement('button');
    btn.className = 'host-btn';
    btn.innerHTML = `<span class="delete" data-index="${i}">×</span><div>${h.name || 'Server'}</div><div class="url">${h.host}</div>`;
    btn.onclick = (e) => {
      if (e.target.classList.contains('delete')) {
        e.stopPropagation();
        const idx = parseInt(e.target.dataset.index);
        const updatedHosts = loadHosts();
        updatedHosts.splice(idx, 1);
        saveHosts(updatedHosts);
        showHostPicker();
        return;
      }
      selectHost(h.host);
    };
    hostList.appendChild(btn);
  }

  hostPicker.style.display = 'block';
  log.style.display = 'none';
  sessionPicker.style.display = 'none';
  setFooterVisible(false);
}

function selectHost(host) {
  serverHost = host;
  hostPicker.style.display = 'none';
  connect();
}

document.getElementById('saveHostBtn').onclick = () => {
  const hostname = document.getElementById('newHostName').value.trim();
  const port = document.getElementById('newHostPort').value.trim() || '8443';
  if (!hostname) return;

  const host = `${hostname}:${port}`;
  const hosts = loadHosts();
  // Check for duplicate
  if (!hosts.some(h => h.host === host)) {
    hosts.push({ host, name: hostname });
    saveHosts(hosts);
  }

  document.getElementById('addHostForm').style.display = 'none';
  document.getElementById('newHostName').value = '';
  document.getElementById('newHostPort').value = '8443';
  selectHost(host);
};

document.getElementById('cancelHostBtn').onclick = () => {
  document.getElementById('addHostForm').style.display = 'none';
  document.getElementById('newHostName').value = '';
  document.getElementById('newHostPort').value = '8443';
};

// On startup: if in app with no configured host, show hosts page; otherwise connect and show sessions
function startup() {
  // Hide all pages initially
  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'none';
  log.style.display = 'none';
  setFooterVisible(false);

  if (isApp) {
    const hosts = loadHosts();
    if (hosts.length === 0) {
      // No saved hosts, show hosts page
      showPage('hosts');
    } else if (hosts.length === 1) {
      // One host, connect directly (will show sessions on hello)
      selectHost(hosts[0].host);
    } else {
      // Multiple hosts, let user choose
      showPage('hosts');
    }
  } else {
    // Running in browser with URL, connect directly (will show sessions on hello)
    connect();
  }
}

function showSessionPicker(sessions) {
  sessionList.innerHTML = '';

  // New session: working directory input (prefilled with the last-used
  // directory or the server default) above the start button.
  const dirInput = document.createElement('input');
  dirInput.placeholder = 'working directory for new session';
  dirInput.autocomplete = 'off';
  dirInput.value = localStorage.getItem('handsfree_workdir') || defaultWorkdir || '~';
  sessionList.appendChild(dirInput);

  const newBtn = document.createElement('button');
  newBtn.className = 'session-btn new';
  newBtn.textContent = '+ Start new session';
  newBtn.onclick = () => {
    const dir = dirInput.value.trim();
    if (dir) localStorage.setItem('handsfree_workdir', dir);
    selectSession(null, dir || null);
  };
  sessionList.appendChild(newBtn);

  // Existing sessions
  for (const s of sessions) {
    const btn = document.createElement('button');
    btn.className = 'session-btn';
    const time = new Date(s.lastUsed).toLocaleString();
    const dir = s.cwd ? `<div class="dir">${s.cwd}</div>` : '';
    btn.innerHTML = `<span class="delete" data-id="${s.id}">×</span><div class="time">${time}</div><div class="preview">${s.preview || '(no preview)'}</div>${dir}`;
    btn.onclick = (e) => {
      if (e.target.classList.contains('delete')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        deleteSession(id);
        return;
      }
      selectSession(s.id);
    };
    sessionList.appendChild(btn);
  }

  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'block';
  log.style.display = 'none';
  setFooterVisible(false);
}

function deleteSession(id) {
  // Remove from cached sessions
  cachedSessions = cachedSessions.filter(s => s.id !== id);
  // Clear from localStorage if it's the current session
  if (currentSessionId === id) {
    currentSessionId = null;
    localStorage.removeItem('handsfree_session');
  }
  // Tell server to delete it
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'deleteSession', id }));
  }
  // Re-render the list
  showSessionPicker(cachedSessions);
}

let lastSelectedSession = null; // Prevent duplicate selections

function selectSession(id, cwd) {
  // Debug: send to server
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'debug', msg: 'selectSession called: id=' + id + ' lastSelected=' + lastSelectedSession + ' children=' + log.children.length }));
  }
  // Prevent duplicate selections that would clear the log
  if (id && id === lastSelectedSession && log.children.length > 0) {
    console.log('Session already selected and has content, skipping');
    return;
  }
  lastSelectedSession = id;
  sessionChosen = true;
  currentSessionId = id;
  // Resumed sessions keep the directory they were started in; new sessions
  // use the one just chosen (falling back to the server default).
  currentCwd = id ? (cachedSessions.find(s => s.id === id)?.cwd || null) : (cwd || null);
  workdirEl.textContent = fmtWorkdir(currentCwd || defaultWorkdir);
  // Persist to localStorage so we can resume after navigating away
  if (id) {
    localStorage.setItem('handsfree_session', id);
  } else {
    localStorage.removeItem('handsfree_session');
  }
  sessionPicker.style.display = 'none';
  log.style.display = 'flex';
  setFooterVisible(true);
  setNavActive('chat');

  // Clear chat log - history will be loaded from server
  log.innerHTML = '';

  if (!id) {
    add('status', 'Started new session in ' + (currentCwd || defaultWorkdir));
  }

  if (ws && ws.readyState === 1) {
    console.log('Sending session selection to server:', id, 'cwd:', currentCwd);
    ws.send(JSON.stringify({ type: 'session', id, cwd: currentCwd }));
  } else {
    console.log('WebSocket not ready, cannot send session:', ws?.readyState);

// Scroll the chat to the bottom on the next frame — a direct scrollTop write

// User messages sent while the agent is busy are queued; keep their bubbles
// pinned at the very bottom of the chat (below the working indicator).

// Long-press again or tap anywhere outside a queued bubble to exit the mode.

function setQueueEditMode(on) {

}

  queuedEls = queuedEls.filter(el => {
    const text = el.firstChild ? el.firstChild.nodeValue : '';
    if (inQueue.has(text)) return true;

    unqueued = true;
    return false;

  // it now belongs to the running conversation, not the waiting pile.

    lpStart = { x: e.clientX, y: e.clientY };
    clearTimeout(lpTimer);
    lpTimer = setTimeout(() => { lpTimer = null; setQueueEditMode(!queueEditMode); }, 500);
  });

    if (lpTimer && lpStart && Math.hypot(e.clientX - lpStart.x, e.clientY - lpStart.y) > 10) {

function pinBottomEls() {

  for (const el of queuedEls) log.appendChild(el);

function add(cls, text) {

  el.textContent = text;

  'Brewing', 'Marinating', 'Scheming', 'Tinkering', 'Deliberating', 'Conjuring', 'Simmering',
  'Wrangling', 'Puzzling', 'Incubating', 'Distilling', 'Untangling'];

// ---------------- WebSocket ----------------
let reconnectTimer = null;
function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (!serverHost) {
    showHostPicker();
    return;
  }
  // Close existing connection if any — detach its handlers first, or its
  // onclose schedules another connect() and every reconnect kills the new
  // healthy socket in an endless 2s churn loop.
  if (ws) {
    ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
    try { ws.close(); } catch {}
    ws = null;
  }
  const wsUrl = `wss://${serverHost}/`;
  console.log('Connecting to:', wsUrl);
  workdirEl.textContent = 'connecting to ' + serverHost + '…';
  try {
    ws = new WebSocket(wsUrl);
  } catch (err) {
    console.error('WebSocket creation failed:', err);
    workdirEl.textContent = 'connection failed: ' + err.message;
    return;
  }
  ws.onopen = () => {
    console.log('WebSocket connected');
    dot.classList.add('on');
  };
  ws.onerror = (err) => {
    console.error('WebSocket error:', err);
    workdirEl.textContent = 'connection error';
  };
  ws.onclose = (event) => {
    console.log('WebSocket closed, code:', event.code, 'reason:', event.reason, 'wasClean:', event.wasClean);
    dot.classList.remove('on');
    workdirEl.textContent = 'disconnected — retrying…';
    // Don't reset sessionChosen on reconnect - user already picked in this browser session
    if (!reconnectTimer) reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 2000);
  };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === 'hello') {
      defaultWorkdir = m.workdir;
      serverHostname = m.hostname || '';
      workdirEl.textContent = fmtWorkdir(currentCwd || m.workdir);
      // A turn may still be running in agentd from before we (re)connected —
      // set busy so progress updates are rendered and spoken. And if the
      // agent is idle, drop any stale busy state left over from a message
      // that was deduplicated away or an interrupt we never saw.
      if (m.busy) {
        agentBusy = true; showWorking(); micBtn.classList.add('busy');
      } else {
        for (const el of queuedEls) clearQueuedLook(el);
        queuedEls = [];
        agentBusy = false; hideWorking(); micBtn.classList.remove('busy');
      }
      cachedSessions = m.sessions || [];
      const numSessions = cachedSessions.length;
      console.log('hello: sessions=' + numSessions + ' sessionChosen=' + sessionChosen + ' currentSessionId=' + currentSessionId);

      // Check for app updates
      if (m.version) checkForUpdate(m.version);

      // Check if we have a saved session from localStorage that still exists on server
      if (currentSessionId) {
        const savedSession = cachedSessions.find(s => s.id === currentSessionId);
        if (savedSession) {
          // Only select if not already chosen (avoid clearing log on reconnect)
          if (!sessionChosen) {
            console.log('Auto-resuming saved session:', currentSessionId);
            selectSession(currentSessionId);
          } else {
            // Already chosen, just re-send session message to server without clearing log
            console.log('Re-sending session selection after reconnect:', currentSessionId);
            if (ws && ws.readyState === 1) {
              ws.send(JSON.stringify({ type: 'session', id: currentSessionId }));
            }
            // Show chat view
            hostPicker.style.display = 'none';
            sessionPicker.style.display = 'none';
            log.style.display = 'flex';
            setFooterVisible(true);
            scrollLog();
            setNavActive('chat');
          }
          return;
        } else {
          // Session no longer exists on server, clear it
          console.log('Saved session not found on server, clearing');
          localStorage.removeItem('handsfree_session');
          currentSessionId = null;
          sessionChosen = false;
        }
      }

      // Show sessions page when connected (unless user already chose a session)
      // But don't override if user explicitly navigated to sessions page
      if (userOnSessionsPage) {
        console.log('User on sessions page, staying there');
        showSessionPicker(cachedSessions);
        setNavActive('sessions');
      } else if (!sessionChosen) {
        console.log('Showing sessions page');
        showSessionPicker(cachedSessions);
        setNavActive('sessions');
      } else {
        console.log('Session already chosen, showing chat');
        // A fresh server connection has no session state; re-assert the
        // new-session choice (and its directory) or messages get rejected.
        if (!currentSessionId && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'session', id: null, cwd: currentCwd }));
        }
        setNavActive('chat');
        hostPicker.style.display = 'none';
        sessionPicker.style.display = 'none';
        log.style.display = 'flex';
        setFooterVisible(true);
        scrollLog();
      }
    }
    else if (m.type === 'transcription') {
      // Handle transcription result from server — clear the oldest pending
      // timer (responses come back in request order).
      if (transcribeTimers.length) clearTimeout(transcribeTimers.shift());
      console.log('Transcription received:', m.text ? m.text.slice(0, 50) : m.error);
      if (interimEl) { interimEl.remove(); interimEl = null; }
      if (m.error) {
        add('error', m.error);
        setState('idle');
      } else if (m.text && m.text.trim()) {
        sendUser(m.text.trim());
      } else {
        setState('idle');
      }
    }
    else if (m.type === 'sessionsUpdated') {
      // Server confirmed session deletion
      cachedSessions = m.sessions || [];
      console.log('Sessions updated from server, count:', cachedSessions.length);
    }
    else if (m.type === 'history') {
      // Server sent conversation history for resumed session
      const count = m.messages?.length || 0;
      console.log('Received history:', count, 'messages');
      // A history response can arrive after the user has already switched
      // sessions (e.g. auto-resume racing a "start new session" tap) — a
      // stale one would repopulate the chat with the old session. Drop it.
      if (m.sessionId !== currentSessionId) {
        console.log('Ignoring stale history for session', m.sessionId, 'current:', currentSessionId);
        return;
      }
      // Send debug to server so we can see it in logs
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'debug', msg: 'Client received history: ' + count + ' messages' }));
      }
      // Rebuild the chat exactly as it looked before: messages, tool
      // activity lines, and any still-queued bubbles pinned at the bottom.
      const queued = m.queued || [];
      if (count > 0 || queued.length > 0) {
        log.innerHTML = '';
        queuedEls = [];
        for (const msg of m.messages || []) {
          if (msg.role === 'user') add('user', msg.text);
          else if (msg.role === 'tool') add('tool', '⚙ ' + msg.text);
          else add('claude', msg.text);
        }
        for (const q of queued) {
          const el = add('user', q);
          markQueued(el);
          queuedEls.push(el);
        }
        if (queued.length > 0) { agentBusy = true; micBtn.classList.add('busy'); }
        if (agentBusy) showWorking();
        pinBottomEls();
        scrollLog();
        // Debug: report final state
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'debug', msg: 'History loaded, children=' + log.children.length + ' display=' + log.style.display }));
        }
      }
    }
    else if (m.type === 'queue') {
      // Authoritative queue snapshot from agentd. Any bubble still claiming
      // to be queued that the agent no longer has is running, was removed on
      // another device, or lost a dedup race — stop showing it as queued.
      lastQueueSnapshot = m.queued || [];
      reconcileQueue();
    }
    else if (m.type === 'dropped') {
      // Our copy of the utterance was deduplicated away (another client's
      // transcription won). The message still runs — as its twin — so the
      // bubble stays, but it must stop claiming to be queued.
      const i = queuedEls.findIndex(el => el.firstChild && el.firstChild.nodeValue === m.text);
      if (i !== -1) {
        const el = queuedEls.splice(i, 1)[0];
        clearQueuedLook(el);
        // Re-pin: an un-dimmed bubble left under the working indicator looks
        // like it's illuminated while still waiting its turn.
        pinBottomEls();
        scrollLog();
      }
      if (!m.busy) { agentBusy = false; hideWorking(); micBtn.classList.remove('busy'); setState('idle'); }
    }
    else if (m.type === 'tool') add('tool', '⚙ ' + m.text);
    else if (m.type === 'status') {
      // The dimmed pinned bubble already signals queueing; drop the status.
      if (!m.text.startsWith('queued')) add('status', m.text);
    }
    else if (m.type === 'assistant') {
      console.log('assistant msg:', m.text.slice(0,50), 'hasAudio:', !!m.audio);
      add('claude', m.text);
      lastReply = m.text;
      if (agentBusy) {
        // If server sent audio, play it; otherwise fall back to browser TTS
        if (m.audio) {
          playServerAudio(m.audio, m.text);
          // Mark as spoken so speak() doesn't repeat it
          const clean = tts.speakable(m.text);
          const sentences = clean.split(/(?<=[.!?])\s+/);
          sentences.forEach(s => tts.spokenSentences.add(s));
        } else {
          speakBrief(m.text);
        }
      }
    }
    else if (m.type === 'error') { agentBusy = false; hideWorking(); setState('idle'); micBtn.classList.remove('busy'); add('error', m.text); speak('Something went wrong: ' + m.text); }
    else if (m.type === 'result') {
      if (queuedEls.length > 0) {
        // A queued message starts the next turn right away: unpin its bubble
        // and stay in the busy state. Re-pin so the working indicator moves
        // below the now-running message — an illuminated bubble under the
        // working line reads as "not started yet".
        const next = queuedEls.shift();
        clearQueuedLook(next);
        pinBottomEls();
        scrollLog();
      } else {
        agentBusy = false; hideWorking(); setState('idle'); micBtn.classList.remove('busy');
      }
      // Update cached sessions if provided
      if (m.sessions) {
        cachedSessions = m.sessions;
        // If this was a new session, save the ID (first in list is most recent)
        if (!currentSessionId && cachedSessions.length > 0) {
          currentSessionId = cachedSessions[0].id;
          currentCwd = cachedSessions[0].cwd || currentCwd;
          localStorage.setItem('handsfree_session', currentSessionId);
          console.log('Saved new session ID:', currentSessionId);
        }
      }
      // Only speak result.text if provided; lastReply was already spoken via speakBrief/playServerAudio
      if (m.text) { lastReply = m.text; speak(m.text); }
      else if (!agentBusy && handsFree && !tts.speaking && tts.queue.length === 0) startListening();
    }
  };
}
startup();


function sendUser(text) {
  text = text.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  if (!sessionChosen) {
    console.warn('sendUser called before session chosen, ignoring');
    add('error', 'Please select a session first');
    return;
  }
  const el = add('user', text);
  ws.send(JSON.stringify({ type: 'user', text }));
  if (agentBusy) {
    // Agent is mid-turn: this message is queued — dim it and pin it at the
    // bottom.
    markQueued(el);
    queuedEls.push(el);
    pinBottomEls();
    scrollLog();
  }
  agentBusy = true;
  micBtn.classList.add('busy');
  setState('idle');
  showWorking();
}

// ---------------- Silero VAD with Whisper ----------------
let myvad = null;
let bargeFrames = 0; // consecutive loud speech frames during playback
let vadReady = false;

// Convert Float32Array at 16kHz to WAV blob
function float32ToWav(float32Array, sampleRate = 16000) {
  const buffer = new ArrayBuffer(44 + float32Array.length * 2);
  const view = new DataView(buffer);
  const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + float32Array.length * 2, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, float32Array.length * 2, true);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

// Singleton init: vadReady only flips at the END of a seconds-long async
// setup, so two overlapping startListening calls both passed the check and
// built TWO live mic VADs. myvad kept only the last; the orphan listened and
// submitted transcriptions forever — duplicate messages from one device, and
// a mic that stayed hot after stopListening.
let vadInitPromise = null;
function initVAD() {
  if (!vadInitPromise) vadInitPromise = doInitVAD();
  return vadInitPromise;
}
// A hung step (permission dialog dropped by the WebView, stalled CDN fetch)
// would leave the singleton promise pending forever, so every step races a
// timeout; the failure path resets vadInitPromise so the next tap retries.
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(label + ' timed out after ' + ms / 1000 + 's')), ms)),
  ]);
}
async function doInitVAD() {
  if (vadReady) return;
  try {
    dbg('[VADINIT] starting, vad lib loaded=' + (typeof vad !== 'undefined'));
    // First request mic permission explicitly
    try {
      await withTimeout(navigator.mediaDevices.getUserMedia({ audio: true }), 15000, 'mic permission');
      dbg('[VADINIT] mic permission granted');
    } catch (micErr) {
      dbg('[VADINIT] mic permission failed: ' + micErr.message);
      add('error', 'Microphone permission denied: ' + micErr.message);
      setState('idle');
      vadInitPromise = null; // allow retry
      return;
    }

    myvad = await withTimeout(vad.MicVAD.new({
      positiveSpeechThreshold: 0.7,   // High = fewer false triggers from TTS bleed
      negativeSpeechThreshold: 0.35,  // Default value
      minSpeechFrames: 5,             // Fewer frames needed to trigger (default 3)
      // The high trigger threshold means capture starts after the first
      // syllables; include ~0.5s of audio from before the trigger so
      // utterance onsets aren't clipped ("queuing" arrived as "to you").
      preSpeechPadFrames: 5,
      submitUserSpeechOnPause: true,  // Push-to-talk: releasing mid-speech still submits
      onSpeechStart: () => {
        // Don't duck or show the listening bubble yet: quiet ambient noise
        // (birds outside) trips the raw VAD constantly. Both reactions wait
        // for a couple of confirmed LOUD speech frames (onFrameProcessed).
        console.log('onSpeechStart fired, tts.speaking=' + tts.speaking);
      },
      // React to loud, high-probability speech frames:
      //  ~2 frames (~60ms): duck playback + show the listening bubble —
      //    this is a person, not a bird.
      //  ~4 frames (~130ms) during playback: hard-stop for the barge-in.
      // The VAD keeps running so onSpeechEnd still gets the full audio.
      onFrameProcessed: (probs, frame) => {
        let e = 0;
        for (let i = 0; i < frame.length; i++) e += frame[i] * frame[i];
        e = Math.sqrt(e / frame.length);
        // Match onSpeechEnd's energy gates: stricter during playback.
        if (probs.isSpeech > 0.7 && e > (tts.speaking ? 0.03 : 0.01)) {
          bargeFrames++;
          if (bargeFrames === 2) {
            if (tts.speaking) tts.duck(true);
            if (!interimEl) { interimEl = add('interim', ''); pinBottomEls(); }
            interimEl.textContent = '… listening...';
          }
          if (tts.speaking && bargeFrames >= 4) {
            bargeFrames = 0;
            console.log('Early barge-in, frame energy:', e.toFixed(4));
            if (ws && ws.readyState === 1) {
              ws.send(JSON.stringify({ type: 'barge_in', energy: e, duringPlayback: true, early: true }));
            }
            tts.stop();
          }
        } else {
          bargeFrames = 0;
        }
      },
      onSpeechEnd: async (audio) => {
        // Check audio energy - reject if too quiet (likely noise/muted mic)
        let energy = 0;
        let maxSample = 0;
        for (let i = 0; i < audio.length; i++) {
          energy += audio[i] * audio[i];
          if (Math.abs(audio[i]) > maxSample) maxSample = Math.abs(audio[i]);
        }
        energy = Math.sqrt(energy / audio.length);
        const duringPlayback = tts.speaking || tts.queue.length > 0;
        console.log('VAD trigger - energy:', energy.toFixed(4), 'max:', maxSample.toFixed(4), 'samples:', audio.length, 'during_playback:', duringPlayback);

        // Send debug info to server for logging
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({
            type: 'vad_debug',
            energy: energy,
            maxSample: maxSample,
            samples: audio.length,
            duringPlayback: duringPlayback,
            timestamp: Date.now()
          }));
        }

        // Use higher threshold during playback to prevent false barge-ins
        const threshold = duringPlayback ? 0.03 : 0.01;
        if (energy < threshold) {
          console.log('Audio too quiet, ignoring (threshold:', threshold, ') energy:', energy.toFixed(4));
          // Send rejection to server for debugging
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'vad_rejected', energy: energy, threshold: threshold, duringPlayback: duringPlayback }));
          }
          tts.duck(false); // false alarm: restore full playback volume
          if (interimEl) { interimEl.remove(); interimEl = null; }
          if (handsFree) setTimeout(startListening, 200);
          return;
        }

        // Now we know it's real speech - do barge-in
        console.log('BARGE-IN triggered, stopping audio, duringPlayback=' + duringPlayback);
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'barge_in', energy: energy, duringPlayback: duringPlayback }));
        }
        tts.stop();  // Stop all TTS (server audio, native, web speech)

        // Pause VAD while transcribing - will restart during playback for barge-in
        if (myvad) myvad.pause();
        listening = false;
        micBtn.classList.remove('listening');
        setState('transcribing');
        if (!interimEl) { interimEl = add('interim', ''); pinBottomEls(); }
        interimEl.textContent = '… transcribing...';

        // Timeout: if no response in 30s, reset state
        const transcribeTimeout = setTimeout(() => {
          console.error('Transcription timeout');
          transcribeTimers = transcribeTimers.filter(t => t !== transcribeTimeout);
          if (interimEl) { interimEl.remove(); interimEl = null; }
          add('error', 'Transcription timed out');
          setState('idle');
          if (handsFree) startListening();
        }, 30000);
        transcribeTimers.push(transcribeTimeout);

        try {
          const audioBlob = float32ToWav(audio);
          console.log('Audio blob size:', audioBlob.size);
          // Send audio over WebSocket (fetch fails on Android due to self-signed cert)
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            console.log('Sending transcribe request, base64 length:', base64.length);
            if (ws && ws.readyState === 1) {
              ws.send(JSON.stringify({ type: 'transcribe', audio: base64 }));
            } else {
              clearTimeout(transcribeTimeout);
              transcribeTimers = transcribeTimers.filter(t => t !== transcribeTimeout);
              if (interimEl) { interimEl.remove(); interimEl = null; }
              add('error', 'Not connected to server');
              setState('idle');
            }
          };
          reader.readAsDataURL(audioBlob);
        } catch (err) {
          clearTimeout(transcribeTimeout);
          transcribeTimers = transcribeTimers.filter(t => t !== transcribeTimeout);
          console.error('Transcription error:', err);
          if (interimEl) { interimEl.remove(); interimEl = null; }
          add('error', 'Transcription failed: ' + err.message);
          setState('idle');
        }
        // Re-arm even while the agent is busy: hands-free users queue
        // messages mid-turn, and without this the mic only came back when
        // the next TTS narration started playing — during quiet stretches
        // of a long turn the mic looked dead.
        if (handsFree) setTimeout(startListening, 800);
      },
      onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
      baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
    }), 30000, 'VAD model load');
    vadReady = true;
    dbg('[VADINIT] VAD initialized successfully');
  } catch (err) {
    dbg('[VADINIT] VAD init failed: ' + (err.message || err));
    add('error', 'VAD init failed: ' + (err.message || err));
    setState('idle');
    vadInitPromise = null; // allow retry
  }
}

async function startListening() {
  if (listening) return;
  unlockTTS();

  if (!vadReady) {
    setState('loading VAD...');
    await initVAD();
  }

  if (myvad) {
    console.log('VAD starting, current state:', myvad.listening);
    myvad.start();
    listening = true;
    micBtn.classList.add('listening');
    setState('listening');
    console.log('VAD started successfully');
  } else {
    dbg('[VADINIT] startListening: VAD not available after init');
  }
}

function stopListening() {
  if (myvad) {
    myvad.pause();
  }
  listening = false;
  micBtn.classList.remove('listening');
  if (interimEl) { interimEl.remove(); interimEl = null; }
  setState('idle');
}

// A background browser tab must not keep transcribing the room: it doubles
// every utterance the visible client hears. The app keeps listening when the
// screen is off — that's hands-free working as intended.
if (!isApp) {
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (listening) stopListening();
    } else if (handsFree && !agentBusy && !tts.speaking) {
      startListening();
    }
  });
}

// ---------------- Text to speech ----------------
// Unified TTS system with three backends:
// 1. Server audio (Piper WAV) - highest quality, requires server
// 2. Native Android TTS - good quality, works offline in app
// 3. Web Speech API - fallback for browsers

const tts = {
  queue: [],
  speaking: false,
  currentAudio: null,
  playGen: 0,       // bumped by stop() to cancel any playback waiting on the mic
  unlocked: false,
  lastQueued: '',
  spokenSentences: new Set(),

  // Check which TTS backend is available
  hasNative() {
    return !!(window.AudioBridge && typeof window.AudioBridge.speak === 'function');
  },
  hasWebSpeech() {
    return 'speechSynthesis' in window;
  },
  hasAny() {
    return this.hasNative() || this.hasWebSpeech();
  },

  // Unlock TTS (required for browsers)
  unlock() {
    if (this.unlocked) return;
    this.unlocked = true;
    if (!this.hasNative() && this.hasWebSpeech()) {
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      speechSynthesis.speak(u);
      setTimeout(() => {
        if (speechSynthesis.getVoices().length === 0)
          add('error', 'No text-to-speech voices in this browser, so replies will be silent.');
      }, 3000);
    }
  },

  // Stop all TTS playback
  stop() {
    // Stop server audio
    if (this.currentAudio) {
      this.currentAudio.pause();
      this.currentAudio = null;
    }
    // Stop native TTS
    if (this.hasNative()) {
      window.AudioBridge.stopSpeaking();
    }
    // Stop Web Speech
    if (this.hasWebSpeech()) {
      speechSynthesis.cancel();
    }
    this.queue.length = 0;
    this.speaking = false;
    this.ducked = false;
    this.playGen++; // cancel any pending mic-first playback
  },

  // Duck (or restore) playback volume while we suspect the user is talking.
  // Only server audio has a volume control; native/web speech can't duck.
  ducked: false,
  duck(on) {
    // Log transitions: a false duck at playback start silences the first
    // words of a reply, and only the server log can tell us it happened.
    if (this.ducked !== on) dbg('[DUCK] ' + (on ? 'on' : 'off') + ' at t=' + (this.currentAudio ? this.currentAudio.currentTime.toFixed(2) : 'n/a'));
    this.ducked = on;
    if (this.currentAudio) this.currentAudio.volume = on ? 0.15 : 1.0;
  },

  // Queue text or audio for speaking
  enqueue(item) {
    // item can be { text, audio } for server audio or { text } for TTS
    if (!item.text && !item.audio) return;

    // Skip duplicates
    const key = item.audio ? 'audio:' + item.text : item.text;
    if (key === this.lastQueued) {
      console.log('TTS skipping duplicate:', item.text?.slice(0, 50));
      return;
    }
    this.lastQueued = key;

    console.log('TTS enqueue:', item.text?.slice(0, 50), 'hasAudio:', !!item.audio);
    this.queue.push(item);
    if (!this.speaking) {
      this.playNext();
    }
  },

  // Play next item in queue
  playNext() {
    if (this.queue.length === 0) {
      this.speaking = false;
      this.currentAudio = null;
      if (!agentBusy) setState('idle');
      if (handsFree && !listening && !agentBusy) startListening();
      // Playback-only listening (barge-in outside hands-free) ends with playback
      else if (!handsFree && listening && !micHold) stopListening();
      return;
    }

    this.speaking = true;
    const item = this.queue.shift();
    // While busy the in-chat working indicator covers it; only label speaking
    setState(agentBusy ? 'idle' : 'speaking');

    const gen = this.playGen;
    const begin = () => {
      // A stop() (barge-in/interrupt) may have landed while we waited
      // for the mic; don't play a stale item over whatever came next.
      if (gen !== this.playGen || !this.speaking) return;
      if (item.audio) {
        this.playServerAudio(item);
      } else {
        this.speakText(item.text);
      }
    };

    // Start VAD during playback so barge-in works in any mode — but hidden
    // pages (e.g. a background browser tab) keep their mic off, or every
    // open client would transcribe and submit the same speech. Hands-free
    // is exempt: the phone runs it from the background via the service.
    if (!listening && (handsFree || !document.hidden)) {
      if (vadReady) {
        // Opening the mic re-routes Android audio and swallows the start
        // of anything already playing (hands-free never hits this: its
        // mic is open before playback begins). Bring the mic up first,
        // give the route a moment to settle, then speak.
        startListening().then(() => setTimeout(begin, 250)).catch(() => begin());
        return;
      }
      // VAD still loading: init in the background, don't hold the reply.
      startListening();
    }
    begin();
  },

  // Tell the server when playback falls back to device TTS, so the reason
  // shows up in the server log instead of dying in the WebView console.
  reportAudioError(stage, err) {
    const detail = err?.message || this.currentAudio?.error?.message || String(err || 'unknown');
    console.error('Server audio ' + stage + ':', detail);
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'debug', msg: `[AUDIO-FALLBACK] ${stage}: ${detail}` }));
    }
  },

  // Play server-generated audio (WAV). A blob URL is used instead of a
  // data: URI — multi-megabyte data URIs fail in Android WebViews, which
  // silently downgraded everything to native TTS.
  playServerAudio(item) {
    let url = null;
    const fallback = (stage, e) => {
      this.reportAudioError(stage, e);
      if (url) URL.revokeObjectURL(url);
      this.currentAudio = null;
      this.speakText(item.text);
    };
    try {
      const bytes = Uint8Array.from(atob(item.audio), c => c.charCodeAt(0));
      url = URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' }));
      this.currentAudio = new Audio(url);
      this.currentAudio.volume = this.ducked ? 0.15 : 1.0;
      this.currentAudio.onended = () => {
        console.log('Server audio ended');
        URL.revokeObjectURL(url);
        this.currentAudio = null;
        this.playNext();
      };
      this.currentAudio.onerror = (e) => fallback('element error', e);
      this.currentAudio.play().catch(e => fallback('play() rejected', e));
    } catch (e) {
      fallback('creation failed', e);
    }
  },

  // Speak text using native or web TTS
  speakText(text) {
    if (!text) {
      this.playNext();
      return;
    }

    if (this.hasNative()) {
      console.log('TTS native:', text.slice(0, 50));
      window.AudioBridge.speak(text);
      // Native TTS calls window.onNativeTTSDone when finished
    } else if (this.hasWebSpeech()) {
      console.log('TTS web:', text.slice(0, 50));
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.05;
      // Chrome workaround for long utterances
      const keepAlive = setInterval(() => {
        if (speechSynthesis.speaking) speechSynthesis.resume();
        else clearInterval(keepAlive);
      }, 5000);
      u.onend = () => { clearInterval(keepAlive); this.playNext(); };
      u.onerror = () => { clearInterval(keepAlive); this.playNext(); };
      speechSynthesis.speak(u);
    } else {
      // No TTS available
      this.playNext();
    }
  },

  // Clean text for TTS
  speakable(text) {
    return text
      .replace(/```[\s\S]*?```/g, ' (code omitted) ')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/https?:\/\/\S+/g, ' (link) ')
      .replace(/[*_#>|]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  },

  // Speak first sentence only (for progress updates)
  speakBrief(text) {
    const clean = this.speakable(text);
    if (!clean) return;
    const firstSentence = clean.split(/(?<=[.!?])\s+/)[0].slice(0, 180);
    this.spokenSentences.add(firstSentence);
    this.enqueue({ text: firstSentence });
  },

  // Speak full text, skipping already-spoken sentences
  speakFull(text) {
    const clean = this.speakable(text).slice(0, 2000);
    const sentences = clean.split(/(?<=[.!?])\s+/);
    const newSentences = sentences.filter(s => !this.spokenSentences.has(s));
    if (newSentences.length > 0) {
      this.enqueue({ text: newSentences.join(' ') });
    }
    this.spokenSentences.clear();
  },

  // Called from native Android when TTS finishes
  onNativeDone() {
    this.playNext();
  }
};

// Bridge for native Android callback
window.onNativeTTSDone = () => tts.onNativeDone();


// Play audio received from server (base64 WAV) - uses unified TTS
function playServerAudio(base64Audio, text) {
  tts.enqueue({ audio: base64Audio, text });
}

// Stop all TTS playback (for barge-in)
function stopServerAudio() {
  tts.stop();
}

// Legacy aliases for compatibility
function speakable(text) { return tts.speakable(text); }
function hasNativeTTS() { return tts.hasNative(); }
function unlockTTS() { tts.unlock(); }

let lastReply = '';
// Legacy wrappers - all TTS now goes through unified tts object
function speak(text) { tts.speakFull(text); }
function speakBrief(text) { tts.speakBrief(text); }

// ---------------- Controls ----------------
// Mic gestures: hold to talk (release stops), slide up to the lock to engage
// hands-free mode, tap while locked to disengage.
function setHandsFree(on) {
  handsFree = on;
  micBtn.classList.toggle('locked', on);
  // Plain monochrome padlock, tinted by the button's accent color — a text
  // emoji here renders in full color and clashes with the theme.
  micBtn.innerHTML = on
    ? '<svg width="32" height="32" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>'
    : '';
  // Android foreground service keeps the mic alive in the background
  try {
    if (on && window.AudioBridge?.startAudioService) window.AudioBridge.startAudioService();
    if (!on && window.AudioBridge?.stopAudioService) window.AudioBridge.stopAudioService();
  } catch (e) { console.log('AudioBridge not available:', e); }
  if (on) { if (!listening) startListening(); }
  else stopListening();
}

const LOCK_DIST = 70; // px to slide up before hands-free locks
let micHold = null;   // { startY, startT, wasListening } while pointer is down

micBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  unlockTTS();
  if (handsFree) { setHandsFree(false); return; } // tap unlocks hands-free
  micHold = { startX: e.clientX, startY: e.clientY, startT: Date.now(), wasListening: listening };
  try { micBtn.setPointerCapture(e.pointerId); } catch {}
  lockHint.classList.add('show');
  if (!listening) startListening();
});

micBtn.addEventListener('pointermove', (e) => {
  if (!micHold) return;
  // Slide toward the lock (left) or up — either engages hands-free
  const d = Math.max(micHold.startX - e.clientX, micHold.startY - e.clientY);
  lockHint.classList.toggle('near', d > LOCK_DIST * 0.5);
  if (d > LOCK_DIST) {
    micHold = null;
    lockHint.classList.remove('show', 'near');
    setHandsFree(true);
  }
});

function micRelease() {
  if (!micHold) return;
  const { startT, wasListening } = micHold;
  micHold = null;
  lockHint.classList.remove('show', 'near');
  const quickTap = Date.now() - startT < 300;
  // Quick tap toggles listening; a real hold is push-to-talk, release stops.
  if (quickTap) { if (wasListening) stopListening(); }
  else stopListening();
}
micBtn.addEventListener('pointerup', micRelease);
micBtn.addEventListener('pointercancel', micRelease);

stopBtn.onclick = () => {
  tts.stop();
  if (handsFree) setHandsFree(false);
  stopListening();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'interrupt' }));
  // Interrupt also discards queued messages agent-side; reflect that here so
  // stale "queued" bubbles don't linger claiming they're still waiting.
  for (const el of queuedEls) clearQueuedLook(el);
  queuedEls = [];
  agentBusy = false;
  hideWorking();
  micBtn.classList.remove('busy');
  setState('idle');
};

document.getElementById('sendBtn').onclick = () => { unlockTTS(); sendUser(textInput.value); textInput.value = ''; };
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { unlockTTS(); sendUser(textInput.value); textInput.value = ''; }
});

// Navigation click handlers
navHosts.onclick = () => showPage('hosts');
navSessions.onclick = () => showPage('sessions');
navChat.onclick = () => showPage('chat');

// Keep the newest message visible when the viewport shrinks (e.g. keyboard).
// Android fires visualViewport resize for the soft keyboard, not window resize.
window.addEventListener('resize', scrollLog);
if (window.visualViewport) window.visualViewport.addEventListener('resize', scrollLog);
</script>
