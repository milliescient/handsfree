<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>handsfree · Claude Code</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<style>
  :root {
    --bg: #0e0f13; --panel: #181a21; --border: #2a2d38;
    --text: #e8e9ee; --dim: #8a8fa3; --accent: #d97757; --ok: #5cbf8a; --err: #e06c75;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.5 system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  #dot { width: 10px; height: 10px; border-radius: 50%; background: var(--err); flex: none; }
  #dot.on { background: var(--ok); }
  #workdir { font-size: 12px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  header button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 13px;
  }
  #autoBtn.on { border-color: var(--accent); color: var(--accent); }

  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .claude { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .tool, .status { align-self: flex-start; font-size: 12px; color: var(--dim); padding: 0 4px; font-family: ui-monospace, monospace; }
  .error { align-self: flex-start; color: var(--err); font-size: 13px; padding: 0 4px; }
  .interim { align-self: flex-end; color: var(--dim); font-style: italic; padding: 0 4px; }

  footer { padding: 10px 16px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  #controls { display: flex; align-items: center; justify-content: center; gap: 18px; }
  #mic {
    width: 78px; height: 78px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 32px;
    box-shadow: 0 4px 18px rgba(217, 119, 87, .35);
    transition: transform .15s;
  }
  #mic:active { transform: scale(.94); }
  #mic.listening { animation: pulse 1.2s infinite; }
  #mic.busy { background: var(--panel); border: 2px solid var(--accent); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 119, 87, .5); }
    50% { box-shadow: 0 0 0 16px rgba(217, 119, 87, 0); }
  }
  #stop {
    width: 52px; height: 52px; border-radius: 50%; font-size: 18px;
    background: var(--panel); color: var(--err); border: 1px solid var(--border);
  }
  #state { width: 52px; text-align: center; font-size: 11px; color: var(--dim); }
  #textRow { display: flex; gap: 8px; }
  #textInput {
    flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-size: 16px; outline: none;
  }
  #sendBtn { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 0 16px; }
  .session-btn { width: 100%; text-align: left; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; position: relative; }
  .session-btn:hover { border-color: var(--accent); }
  .session-btn .preview { color: var(--dim); font-size: 13px; margin-top: 4px; padding-right: 40px; }
  .session-btn .time { color: var(--dim); font-size: 11px; }
  .session-btn.new { border-color: var(--ok); color: var(--ok); }
  .session-btn .delete { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--err); font-size: 24px; padding: 12px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .host-btn { width: 100%; text-align: left; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; }
  .host-btn:hover { border-color: var(--accent); }
  .host-btn .url { color: var(--dim); font-size: 13px; margin-top: 4px; word-break: break-all; }
  .host-btn.add { border-color: var(--ok); color: var(--ok); }
  .host-btn .delete { float: right; color: var(--err); font-size: 18px; padding: 0 8px; }
  #hostPicker input { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-bottom: 8px; outline: none; }
  #hostPicker input:focus { border-color: var(--accent); }
  #navbar { display: flex; border-bottom: 1px solid var(--border); }
  #navbar button { flex: 1; background: var(--panel); color: var(--dim); border: none; padding: 12px 8px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
  #navbar button.active { color: var(--accent); border-bottom-color: var(--accent); }
  #navbar button:not(.active):hover { color: var(--text); }
</style>
</head>
<body>
<header>
  <div id="dot"></div>
  <div id="workdir">connecting…</div>
  <a id="apkBtn" href="handsfree.apk" download style="display:none;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;text-decoration:none;">📱 APK</a>
  <button id="autoBtn" title="Auto-listen after Claude speaks">🎧 hands-free</button>
</header>

<nav id="navbar">
  <button id="navHosts">Servers</button>
  <button id="navSessions">Sessions</button>
  <button id="navChat" class="active">Chat</button>
</nav>

<div id="hostPicker" style="display:none; padding:16px;">
  <div style="color:var(--dim); margin-bottom:12px;">Connect to a server:</div>
  <div id="hostList"></div>
  <div id="addHostForm" style="display:none; margin-top:16px;">
    <input id="newHostName" placeholder="hostname or IP address" autocomplete="off">
    <input id="newHostPort" placeholder="port" value="8443" autocomplete="off" style="margin-top:0;">
    <div style="display:flex; gap:8px;">
      <button class="host-btn" id="saveHostBtn" style="flex:1; text-align:center;">Save</button>
      <button class="host-btn" id="cancelHostBtn" style="flex:1; text-align:center; color:var(--dim);">Cancel</button>
    </div>
  </div>
</div>
<div id="sessionPicker" style="display:none; padding:16px;">
  <div style="color:var(--dim); margin-bottom:12px;">Choose a session:</div>
  <div id="sessionList"></div>
</div>
<div id="log" style="display:none;"></div>

<footer>
  <div id="controls">
    <div id="state">idle</div>
    <button id="mic" title="Tap to talk"></button>
    <button id="stop" title="Interrupt">■</button>
  </div>
  <div id="textRow">
    <input id="textInput" placeholder="or type a message…" autocomplete="off">
    <button id="sendBtn">send</button>
  </div>
</footer>

<script>
const log = document.getElementById('log');
const dot = document.getElementById('dot');
const workdirEl = document.getElementById('workdir');
const micBtn = document.getElementById('mic');
const stopBtn = document.getElementById('stop');
const autoBtn = document.getElementById('autoBtn');
const stateEl = document.getElementById('state');
const textInput = document.getElementById('textInput');

let ws = null;
let listening = false;
let agentBusy = false;
let handsFree = false;
let interimEl = null;
let sessionChosen = false;
let currentSessionId = localStorage.getItem('handsfree_session') || null; // Persist across reloads
let cachedSessions = []; // Store sessions from server
const sessionPicker = document.getElementById('sessionPicker');
const sessionList = document.getElementById('sessionList');
const hostPicker = document.getElementById('hostPicker');
const hostList = document.getElementById('hostList');
const navHosts = document.getElementById('navHosts');
const navSessions = document.getElementById('navSessions');
const navChat = document.getElementById('navChat');

function setNavActive(page) {
  navHosts.classList.remove('active');
  navSessions.classList.remove('active');
  navChat.classList.remove('active');
  if (page === 'hosts') navHosts.classList.add('active');
  else if (page === 'sessions') navSessions.classList.add('active');
  else navChat.classList.add('active');
}

let userOnSessionsPage = false; // Track if user explicitly navigated to sessions

function showPage(page) {
  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'none';
  log.style.display = 'none';
  setNavActive(page);
  userOnSessionsPage = (page === 'sessions');
  if (page === 'hosts') {
    showHostPicker();
  } else if (page === 'sessions') {
    // Reset lastSelectedSession so user can re-select the same session
    lastSelectedSession = null;
    // Use cached sessions (updated from hello message and after each session use)
    showSessionPicker(cachedSessions);
  } else {
    log.style.display = 'flex';
  }
}

// Host can come from URL (browser) or saved config (app)
let serverHost = location.host;

// Check if we're running in the app - Capacitor uses localhost or has the native bridge
const isApp = !location.host || location.protocol === 'file:' || location.host === 'localhost' || !!(window.Capacitor || window.AudioBridge);

// App version - git SHA, set by build-apk.sh
const APP_VERSION = '4fa54a5';
const CODE_VERSION = 'v2-delayed-bargein'; // Change this when updating VAD logic
console.log('Code version:', CODE_VERSION);

// Show APK download button in browser only
if (!isApp) {
  document.getElementById('apkBtn').style.display = 'block';
}

// Called from Android if update fails
window.onUpdateError = function(msg) {
  hideDownloadingOverlay();
  add('error', 'Update failed: ' + msg);
};

function hideDownloadingOverlay() {
  const overlay = document.getElementById('downloadOverlay');
  if (overlay) overlay.remove();
}

// Check for updates and prompt user
let updatePromptShown = false;
function checkForUpdate(serverVersion) {
  if (!isApp) return;
  if (updatePromptShown) return; // Don't prompt repeatedly
  // If versions differ and neither is unknown/dev, offer update
  if (serverVersion && APP_VERSION && serverVersion !== APP_VERSION &&
      serverVersion !== 'unknown' && APP_VERSION !== 'dev') {
    updatePromptShown = true;
    showUpdateDialog(serverVersion);
  }
}

function showUpdateDialog(serverVersion) {
  const dialog = document.createElement('div');
  dialog.id = 'updateDialog';
  dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
  dialog.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:300px;text-align:center;">
      <div style="font-size:18px;margin-bottom:12px;">Update Available</div>
      <div style="color:var(--dim);margin-bottom:20px;">New version ${serverVersion}<br>You have ${APP_VERSION}</div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button id="updateNo" style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:14px;">Later</button>
        <button id="updateYes" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;">Update</button>
      </div>
    </div>
  `;
  document.body.appendChild(dialog);

  document.getElementById('updateNo').onclick = () => dialog.remove();
  document.getElementById('updateYes').onclick = () => {
    dialog.remove();
    if (window.AudioBridge && typeof window.AudioBridge.installUpdate === 'function') {
      const apkUrl = 'https://' + serverHost + '/handsfree.apk';
      showDownloadingOverlay();
      window.AudioBridge.installUpdate(apkUrl);
    }
  };
}

// Periodically check for updates (every 30 seconds)
setInterval(() => {
  if (!isApp || !serverHost) return;
  fetch('https://' + serverHost + '/version')
    .then(r => r.json())
    .then(data => { if (data.version) checkForUpdate(data.version); })
    .catch(() => {}); // Ignore errors
}, 30000);

// Show a fullscreen overlay while downloading update
function showDownloadingOverlay() {
  const overlay = document.createElement('div');
  overlay.id = 'downloadOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;';
  overlay.innerHTML = '<div style="font-size:24px;margin-bottom:16px;">Downloading update...</div><div style="color:var(--dim);">Please wait</div>';
  document.body.appendChild(overlay);
}

function loadHosts() {
  try { return JSON.parse(localStorage.getItem('handsfree_hosts') || '[]'); } catch { return []; }
}

function saveHosts(hosts) {
  localStorage.setItem('handsfree_hosts', JSON.stringify(hosts));
}

function showHostPicker() {
  const hosts = loadHosts();
  hostList.innerHTML = '';

  // Add new host button
  const addBtn = document.createElement('button');
  addBtn.className = 'host-btn add';
  addBtn.textContent = '+ Add new server';
  addBtn.onclick = () => {
    document.getElementById('addHostForm').style.display = 'block';
    document.getElementById('newHostUrl').focus();
  };
  hostList.appendChild(addBtn);

  // Existing hosts
  for (let i = 0; i < hosts.length; i++) {
    const h = hosts[i];
    const btn = document.createElement('button');
    btn.className = 'host-btn';
    btn.innerHTML = `<span class="delete" data-index="${i}">×</span><div>${h.name || 'Server'}</div><div class="url">${h.host}</div>`;
    btn.onclick = (e) => {
      if (e.target.classList.contains('delete')) {
        e.stopPropagation();
        const idx = parseInt(e.target.dataset.index);
        const updatedHosts = loadHosts();
        updatedHosts.splice(idx, 1);
        saveHosts(updatedHosts);
        showHostPicker();
        return;
      }
      selectHost(h.host);
    };
    hostList.appendChild(btn);
  }

  hostPicker.style.display = 'block';
  log.style.display = 'none';
  sessionPicker.style.display = 'none';
}

function selectHost(host) {
  serverHost = host;
  hostPicker.style.display = 'none';
  connect();
}

document.getElementById('saveHostBtn').onclick = () => {
  const hostname = document.getElementById('newHostName').value.trim();
  const port = document.getElementById('newHostPort').value.trim() || '8443';
  if (!hostname) return;

  const host = `${hostname}:${port}`;
  const hosts = loadHosts();
  // Check for duplicate
  if (!hosts.some(h => h.host === host)) {
    hosts.push({ host, name: hostname });
    saveHosts(hosts);
  }

  document.getElementById('addHostForm').style.display = 'none';
  document.getElementById('newHostName').value = '';
  document.getElementById('newHostPort').value = '8443';
  selectHost(host);
};

document.getElementById('cancelHostBtn').onclick = () => {
  document.getElementById('addHostForm').style.display = 'none';
  document.getElementById('newHostName').value = '';
  document.getElementById('newHostPort').value = '8443';
};

// On startup: if in app with no configured host, show hosts page; otherwise connect and show sessions
function startup() {
  // Hide all pages initially
  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'none';
  log.style.display = 'none';

  if (isApp) {
    const hosts = loadHosts();
    if (hosts.length === 0) {
      // No saved hosts, show hosts page
      showPage('hosts');
    } else if (hosts.length === 1) {
      // One host, connect directly (will show sessions on hello)
      selectHost(hosts[0].host);
    } else {
      // Multiple hosts, let user choose
      showPage('hosts');
    }
  } else {
    // Running in browser with URL, connect directly (will show sessions on hello)
    connect();
  }
}

function showSessionPicker(sessions) {
  sessionList.innerHTML = '';

  // New session button
  const newBtn = document.createElement('button');
  newBtn.className = 'session-btn new';
  newBtn.textContent = '+ Start new session';
  newBtn.onclick = () => selectSession(null);
  sessionList.appendChild(newBtn);

  // Existing sessions
  for (const s of sessions) {
    const btn = document.createElement('button');
    btn.className = 'session-btn';
    const time = new Date(s.lastUsed).toLocaleString();
    btn.innerHTML = `<span class="delete" data-id="${s.id}">×</span><div class="time">${time}</div><div class="preview">${s.preview || '(no preview)'}</div>`;
    btn.onclick = (e) => {
      if (e.target.classList.contains('delete')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        deleteSession(id);
        return;
      }
      selectSession(s.id);
    };
    sessionList.appendChild(btn);
  }

  hostPicker.style.display = 'none';
  sessionPicker.style.display = 'block';
  log.style.display = 'none';
}

function deleteSession(id) {
  // Remove from cached sessions
  cachedSessions = cachedSessions.filter(s => s.id !== id);
  // Clear from localStorage if it's the current session
  if (currentSessionId === id) {
    currentSessionId = null;
    localStorage.removeItem('handsfree_session');
  }
  // Tell server to delete it
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'deleteSession', id }));
  }
  // Re-render the list
  showSessionPicker(cachedSessions);
}

let pendingHistoryLoad = false; // Track if we're waiting for history
let lastSelectedSession = null; // Prevent duplicate selections

function selectSession(id) {
  // Prevent duplicate selections that would clear the log
  if (id && id === lastSelectedSession && log.children.length > 0) {
    console.log('Session already selected and has content, skipping');
    return;
  }
  lastSelectedSession = id;
  sessionChosen = true;
  currentSessionId = id;
  // Persist to localStorage so we can resume after navigating away
  if (id) {
    localStorage.setItem('handsfree_session', id);
  } else {
    localStorage.removeItem('handsfree_session');
  }
  sessionPicker.style.display = 'none';
  log.style.display = 'flex';
  setNavActive('chat');

  // Clear chat log - history will be loaded from server
  log.innerHTML = '';
  pendingHistoryLoad = !!id; // Expect history if resuming existing session

  if (!id) {
    add('status', 'Started new session');
  }

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'session', id }));
  }
}

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  if (cls === 'tool' || cls === 'status' || cls === 'error' || cls === 'interim') el.className = cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

function setState(s) { stateEl.textContent = s; }

// ---------------- WebSocket ----------------
let reconnectTimer = null;
function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (!serverHost) {
    showHostPicker();
    return;
  }
  // Close existing connection if any — detach its handlers first, or its
  // onclose schedules another connect() and every reconnect kills the new
  // healthy socket in an endless 2s churn loop.
  if (ws) {
    ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
    try { ws.close(); } catch {}
    ws = null;
  }
  const wsUrl = `wss://${serverHost}/`;
  console.log('Connecting to:', wsUrl);
  workdirEl.textContent = 'connecting to ' + serverHost + '…';
  try {
    ws = new WebSocket(wsUrl);
  } catch (err) {
    console.error('WebSocket creation failed:', err);
    workdirEl.textContent = 'connection failed: ' + err.message;
    return;
  }
  ws.onopen = () => {
    console.log('WebSocket connected');
    dot.classList.add('on');
  };
  ws.onerror = (err) => {
    console.error('WebSocket error:', err);
    workdirEl.textContent = 'connection error';
  };
  ws.onclose = (event) => {
    console.log('WebSocket closed, code:', event.code, 'reason:', event.reason, 'wasClean:', event.wasClean);
    dot.classList.remove('on');
    workdirEl.textContent = 'disconnected — retrying…';
    // Don't reset sessionChosen on reconnect - user already picked in this browser session
    if (!reconnectTimer) reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 2000);
  };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === 'hello') {
      workdirEl.textContent = m.workdir;
      cachedSessions = m.sessions || [];
      const numSessions = cachedSessions.length;
      console.log('hello: sessions=' + numSessions + ' sessionChosen=' + sessionChosen + ' currentSessionId=' + currentSessionId);

      // Check for app updates
      if (m.version) checkForUpdate(m.version);

      // Check if we have a saved session from localStorage that still exists on server
      if (currentSessionId) {
        const savedSession = cachedSessions.find(s => s.id === currentSessionId);
        if (savedSession) {
          // Only select if not already chosen (avoid clearing log on reconnect)
          if (!sessionChosen) {
            console.log('Auto-resuming saved session:', currentSessionId);
            selectSession(currentSessionId);
          } else {
            // Already chosen, just re-send session message to server without clearing log
            console.log('Re-sending session selection after reconnect:', currentSessionId);
            if (ws && ws.readyState === 1) {
              ws.send(JSON.stringify({ type: 'session', id: currentSessionId }));
            }
            // Show chat view
            hostPicker.style.display = 'none';
            sessionPicker.style.display = 'none';
            log.style.display = 'flex';
            setNavActive('chat');
            // Allow history to load if log is empty (e.g., after page refresh)
            if (log.children.length === 0) {
              pendingHistoryLoad = true;
            }
          }
          return;
        } else {
          // Session no longer exists on server, clear it
          console.log('Saved session not found on server, clearing');
          localStorage.removeItem('handsfree_session');
          currentSessionId = null;
          sessionChosen = false;
        }
      }

      // Show sessions page when connected (unless user already chose a session)
      // But don't override if user explicitly navigated to sessions page
      if (userOnSessionsPage) {
        console.log('User on sessions page, staying there');
        showSessionPicker(cachedSessions);
        setNavActive('sessions');
      } else if (!sessionChosen) {
        console.log('Showing sessions page');
        showSessionPicker(cachedSessions);
        setNavActive('sessions');
      } else {
        console.log('Session already chosen, showing chat');
        setNavActive('chat');
        hostPicker.style.display = 'none';
        sessionPicker.style.display = 'none';
        log.style.display = 'flex';
      }
    }
    else if (m.type === 'transcription') {
      // Handle transcription result from server
      if (window._transcribeTimeout) {
        clearTimeout(window._transcribeTimeout);
        window._transcribeTimeout = null;
      }
      console.log('Transcription received:', m.text ? m.text.slice(0, 50) : m.error);
      if (interimEl) { interimEl.remove(); interimEl = null; }
      if (m.error) {
        add('error', m.error);
        setState('idle');
      } else if (m.text && m.text.trim()) {
        sendUser(m.text.trim());
      } else {
        setState('idle');
      }
    }
    else if (m.type === 'sessionsUpdated') {
      // Server confirmed session deletion
      cachedSessions = m.sessions || [];
      console.log('Sessions updated from server, count:', cachedSessions.length);
    }
    else if (m.type === 'history') {
      // Server sent conversation history for resumed session
      const count = m.messages?.length || 0;
      console.log('Received history:', count, 'messages');
      // Debug alert disabled
      // alert('Got ' + count + ' history messages');
      // Load history if we have messages
      if (m.messages && m.messages.length > 0) {
        // Clear log and add messages
        log.innerHTML = '';
        for (const msg of m.messages) {
          add(msg.role === 'user' ? 'user' : 'claude', msg.text);
        }
        add('status', 'Loaded ' + count + ' messages');
        log.scrollTop = log.scrollHeight;
      }
    }
    else if (m.type === 'tool') add('tool', '⚙ ' + m.text);
    else if (m.type === 'status') add('status', m.text);
    else if (m.type === 'assistant') {
      console.log('assistant msg:', m.text.slice(0,50), 'hasAudio:', !!m.audio);
      add('claude', m.text);
      lastReply = m.text;
      if (agentBusy) {
        // If server sent audio, play it; otherwise fall back to browser TTS
        if (m.audio) {
          playServerAudio(m.audio, m.text);
          // Mark as spoken so speak() doesn't repeat it with browser TTS
          const clean = speakable(m.text);
          const sentences = clean.split(/(?<=[.!?])\s+/);
          sentences.forEach(s => spokenSentences.add(s));
        } else {
          speakBrief(m.text);
        }
      }
    }
    else if (m.type === 'error') { agentBusy = false; setState('idle'); micBtn.classList.remove('busy'); add('error', m.text); speak('Something went wrong: ' + m.text); }
    else if (m.type === 'result') {
      agentBusy = false; setState('idle'); micBtn.classList.remove('busy');
      // Update cached sessions if provided
      if (m.sessions) {
        cachedSessions = m.sessions;
        // If this was a new session, save the ID (first in list is most recent)
        if (!currentSessionId && cachedSessions.length > 0) {
          currentSessionId = cachedSessions[0].id;
          localStorage.setItem('handsfree_session', currentSessionId);
          console.log('Saved new session ID:', currentSessionId);
        }
      }
      // Only speak result.text if provided; lastReply was already spoken via speakBrief/playServerAudio
      if (m.text) { lastReply = m.text; speak(m.text); }
      else if (handsFree && !ttsSpeaking && !audioPlaying && ttsQueue.length === 0 && audioQueue.length === 0) startListening();
    }
  };
}
startup();


function sendUser(text) {
  text = text.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  if (!sessionChosen) {
    console.warn('sendUser called before session chosen, ignoring');
    add('error', 'Please select a session first');
    return;
  }
  add('user', text);
  ws.send(JSON.stringify({ type: 'user', text }));
  agentBusy = true;
  micBtn.classList.add('busy');
  setState('working');
}

// ---------------- Silero VAD with Whisper ----------------
let myvad = null;
let vadReady = false;

// Convert Float32Array at 16kHz to WAV blob
function float32ToWav(float32Array, sampleRate = 16000) {
  const buffer = new ArrayBuffer(44 + float32Array.length * 2);
  const view = new DataView(buffer);
  const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + float32Array.length * 2, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, float32Array.length * 2, true);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

async function initVAD() {
  if (vadReady) return;
  try {
    console.log('Initializing VAD...');
    // First request mic permission explicitly
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      console.log('Mic permission granted');
    } catch (micErr) {
      console.error('Mic permission denied:', micErr);
      add('error', 'Microphone permission denied: ' + micErr.message);
      return;
    }

    myvad = await vad.MicVAD.new({
      positiveSpeechThreshold: 0.7,   // Lower = more sensitive (default 0.5)
      negativeSpeechThreshold: 0.35,  // Default value
      minSpeechFrames: 5,             // Fewer frames needed to trigger (default 3)
      onSpeechStart: () => {
        // Don't stop audio yet - wait for onSpeechEnd to confirm it's real speech
        // Just show a subtle indicator
        console.log('onSpeechStart fired, audioPlaying=' + audioPlaying);
        if (!interimEl) interimEl = add('interim', '');
        interimEl.textContent = '… listening...';
      },
      onSpeechEnd: async (audio) => {
        // Check audio energy - reject if too quiet (likely noise/muted mic)
        let energy = 0;
        let maxSample = 0;
        for (let i = 0; i < audio.length; i++) {
          energy += audio[i] * audio[i];
          if (Math.abs(audio[i]) > maxSample) maxSample = Math.abs(audio[i]);
        }
        energy = Math.sqrt(energy / audio.length);
        const duringPlayback = audioPlaying || audioQueue.length > 0;
        console.log('VAD trigger - energy:', energy.toFixed(4), 'max:', maxSample.toFixed(4), 'samples:', audio.length, 'during_playback:', duringPlayback);

        // Send debug info to server for logging
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({
            type: 'vad_debug',
            energy: energy,
            maxSample: maxSample,
            samples: audio.length,
            duringPlayback: duringPlayback,
            timestamp: Date.now()
          }));
        }

        // Use higher threshold during playback to prevent false barge-ins
        const threshold = duringPlayback ? 0.03 : 0.01;
        if (energy < threshold) {
          console.log('Audio too quiet, ignoring (threshold:', threshold, ') energy:', energy.toFixed(4));
          // Send rejection to server for debugging
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'vad_rejected', energy: energy, threshold: threshold, duringPlayback: duringPlayback }));
          }
          if (interimEl) { interimEl.remove(); interimEl = null; }
          if (handsFree && !agentBusy) setTimeout(startListening, 200);
          return;
        }

        // Now we know it's real speech - do barge-in
        console.log('BARGE-IN triggered, stopping audio, duringPlayback=' + duringPlayback);
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'barge_in', energy: energy, duringPlayback: duringPlayback }));
        }
        stopServerAudio();
        if (ttsSpeaking || ttsQueue.length > 0) {
          if (hasNativeTTS()) {
            window.AudioBridge.stopSpeaking();
          } else if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
          }
          ttsQueue.length = 0;
          ttsSpeaking = false;
        }

        // Pause VAD while transcribing - will restart during playback for barge-in
        if (myvad) myvad.pause();
        listening = false;
        micBtn.classList.remove('listening');
        setState('transcribing');
        if (!interimEl) interimEl = add('interim', '');
        interimEl.textContent = '… transcribing...';

        // Timeout: if no response in 30s, reset state
        const transcribeTimeout = setTimeout(() => {
          console.error('Transcription timeout');
          if (interimEl) { interimEl.remove(); interimEl = null; }
          add('error', 'Transcription timed out');
          setState('idle');
          if (handsFree && !agentBusy) startListening();
        }, 30000);

        // Store timeout so we can clear it when response arrives
        window._transcribeTimeout = transcribeTimeout;

        try {
          const audioBlob = float32ToWav(audio);
          console.log('Audio blob size:', audioBlob.size);
          // Send audio over WebSocket (fetch fails on Android due to self-signed cert)
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            console.log('Sending transcribe request, base64 length:', base64.length);
            if (ws && ws.readyState === 1) {
              ws.send(JSON.stringify({ type: 'transcribe', audio: base64 }));
            } else {
              clearTimeout(window._transcribeTimeout);
              if (interimEl) { interimEl.remove(); interimEl = null; }
              add('error', 'Not connected to server');
              setState('idle');
            }
          };
          reader.readAsDataURL(audioBlob);
        } catch (err) {
          clearTimeout(window._transcribeTimeout);
          console.error('Transcription error:', err);
          if (interimEl) { interimEl.remove(); interimEl = null; }
          add('error', 'Transcription failed: ' + err.message);
          setState('idle');
        }
        if (handsFree && !agentBusy) setTimeout(startListening, 800);
      },
      onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
      baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
    });
    vadReady = true;
    console.log('VAD initialized successfully');
  } catch (err) {
    console.error('VAD init failed:', err);
    add('error', 'VAD init failed: ' + (err.message || err));
    setState('idle');
  }
}

async function startListening() {
  if (listening) return;
  unlockTTS();

  if (!vadReady) {
    setState('loading VAD...');
    await initVAD();
  }

  if (myvad) {
    console.log('VAD starting, current state:', myvad.listening);
    myvad.start();
    listening = true;
    micBtn.classList.add('listening');
    setState('listening');
    console.log('VAD started successfully');
  } else {
    console.log('VAD not available!');
  }
}

function stopListening() {
  if (myvad) {
    myvad.pause();
  }
  listening = false;
  micBtn.classList.remove('listening');
  if (interimEl) { interimEl.remove(); interimEl = null; }
  setState('idle');
}

// ---------------- Text to speech ----------------
// Queue for server-generated audio
let audioQueue = [];
let audioPlaying = false;
let currentAudio = null;

// Play audio received from server (base64 WAV)
function playServerAudio(base64Audio, text) {
  console.log('playServerAudio queuing:', text.slice(0, 50), 'queueLen:', audioQueue.length, 'playing:', audioPlaying);
  audioQueue.push({ audio: base64Audio, text });
  if (!audioPlaying) {
    playNextAudio();
  }
}

function playNextAudio() {
  if (audioQueue.length === 0) {
    audioPlaying = false;
    currentAudio = null;
    if (!agentBusy) setState('idle');
    if (handsFree && !listening && !agentBusy) startListening();
    return;
  }

  audioPlaying = true;
  const item = audioQueue.shift();
  setState(agentBusy ? 'working' : 'speaking');

  // Start VAD during playback for barge-in detection
  console.log('playNextAudio: handsFree=' + handsFree + ' listening=' + listening);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'debug', msg: 'playNextAudio handsFree=' + handsFree + ' listening=' + listening }));
  }
  if (handsFree && !listening) {
    console.log('Starting VAD for barge-in detection');
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'debug', msg: 'Starting VAD for barge-in' }));
    }
    startListening();
  }

  try {
    currentAudio = new Audio('data:audio/wav;base64,' + item.audio);
    currentAudio.onended = () => {
      console.log('Audio playback ended');
      currentAudio = null;
      playNextAudio();
    };
    currentAudio.onerror = (e) => {
      console.error('Audio playback error:', e);
      currentAudio = null;
      // Fall back to browser TTS if audio fails
      speakBrief(item.text);
      playNextAudio();
    };
    currentAudio.play().catch(e => {
      console.error('Audio play failed:', e);
      currentAudio = null;
      speakBrief(item.text);
      playNextAudio();
    });
  } catch (e) {
    console.error('Audio creation failed:', e);
    currentAudio = null;
    speakBrief(item.text);
    playNextAudio();
  }
}

// Stop server audio playback (for barge-in)
function stopServerAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  audioQueue.length = 0;
  audioPlaying = false;
}

function speakable(text) {
  return text
    .replace(/```[\s\S]*?```/g, ' (code omitted) ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/https?:\/\/\S+/g, ' (link) ')
    .replace(/[*_#>|]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

let ttsUnlocked = false;
let lastReply = '';

// Check if native Android TTS is available (check dynamically since bridge may load late)
function hasNativeTTS() {
  const has = !!(window.AudioBridge && typeof window.AudioBridge.speak === 'function');
  console.log('hasNativeTTS check:', has, 'AudioBridge:', !!window.AudioBridge);
  return has;
}

// Browsers refuse to play audio that wasn't initiated by a user gesture.
// Speaking a silent utterance inside the first tap unlocks TTS for the
// replies that arrive later over the WebSocket.
function unlockTTS() {
  if (ttsUnlocked) return;
  ttsUnlocked = true;
  if (!hasNativeTTS() && 'speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    speechSynthesis.speak(u);
    setTimeout(() => {
      if (speechSynthesis.getVoices().length === 0)
        add('error', 'No text-to-speech voices in this browser, so replies will be silent. Linux: install speech-dispatcher + espeak-ng (or use Chrome). iPhone: check the mute switch.');
    }, 3000);
  }
}

let speakTimeout = null;
let ttsQueue = [];
let ttsSpeaking = false;

// Called from native Android when TTS finishes
window.onNativeTTSDone = function() {
  ttsSpeaking = false;
  speakNext();
};

function speakNext() {
  if (ttsQueue.length === 0) {
    ttsSpeaking = false;
    if (!agentBusy) setState('idle');
    if (handsFree && !listening && !agentBusy) startListening();
    return;
  }
  ttsSpeaking = true;
  const clean = ttsQueue.shift();
  setState(agentBusy ? 'working' : 'speaking');
  // Start VAD during TTS for barge-in detection
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'debug', msg: 'speakNext: handsFree=' + handsFree + ' listening=' + listening }));
  }
  if (handsFree && !listening) {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'debug', msg: 'Starting VAD for TTS barge-in' }));
    }
    startListening();
  }

  if (hasNativeTTS()) {
    // Use native Android TTS
    console.log('Speaking via native TTS:', clean.slice(0, 50));
    window.AudioBridge.speak(clean);
  } else if ('speechSynthesis' in window) {
    // Fall back to Web Speech API
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.05;
    // Desktop Chrome silently stalls long utterances after ~15s unless nudged.
    const keepAlive = setInterval(() => {
      if (speechSynthesis.speaking) speechSynthesis.resume();
      else clearInterval(keepAlive);
    }, 5000);
    u.onend = () => { clearInterval(keepAlive); speakNext(); };
    u.onerror = () => { clearInterval(keepAlive); speakNext(); };
    speechSynthesis.speak(u);
  } else {
    // No TTS available, skip to next
    speakNext();
  }
}

let lastQueued = '';
function speakRaw(clean) {
  if (!clean) {
    if (handsFree && !agentBusy) startListening();
    return;
  }
  // If server audio is playing or queued, don't use browser/native TTS
  if (audioPlaying || audioQueue.length > 0) {
    console.log('speakRaw SKIPPED - server audio active');
    return;
  }
  if (!hasNativeTTS() && !('speechSynthesis' in window)) {
    if (handsFree && !agentBusy) startListening();
    return;
  }
  // Skip if this is the same text we just queued (prevents duplicates)
  if (clean === lastQueued) {
    console.log('speakRaw SKIPPED duplicate:', clean.slice(0, 50));
    return;
  }
  console.log('speakRaw QUEUING:', clean.slice(0, 50), 'queue length:', ttsQueue.length);
  lastQueued = clean;
  ttsQueue.push(clean);
  if (!ttsSpeaking) {
    speakNext();
  }
}

// Track sentences we've already spoken so we don't repeat them
let spokenSentences = new Set();

// Full reply, spoken at end of turn.
function speak(text) {
  const clean = speakable(text).slice(0, 2000);
  // Split into sentences and only speak ones we haven't said yet
  const sentences = clean.split(/(?<=[.!?])\s+/);
  const newSentences = sentences.filter(s => !spokenSentences.has(s));
  if (newSentences.length > 0) {
    const toSpeak = newSentences.join(' ');
    console.log('speak() queuing new sentences:', toSpeak.slice(0, 50));
    speakRaw(toSpeak);
  }
  // Clear for next turn
  spokenSentences.clear();
}

// Progress narration while the agent works: first sentence, kept short.
function speakBrief(text) {
  const clean = speakable(text);
  if (!clean) return;
  const firstSentence = clean.split(/(?<=[.!?])\s+/)[0].slice(0, 180);
  spokenSentences.add(firstSentence);
  speakRaw(firstSentence);
}

// ---------------- Controls ----------------
micBtn.onclick = () => { unlockTTS(); listening ? stopListening() : startListening(); };

stopBtn.onclick = () => {
  stopServerAudio();
  if (hasNativeTTS()) {
    window.AudioBridge.stopSpeaking();
  } else if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
  }
  ttsQueue.length = 0;
  ttsSpeaking = false;
  stopListening();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'interrupt' }));
  agentBusy = false;
  micBtn.classList.remove('busy');
  setState('idle');
};

autoBtn.onclick = () => {
  unlockTTS();
  handsFree = !handsFree;
  autoBtn.classList.toggle('on', handsFree);
  if (handsFree) {
    // Start Android foreground service if available (keeps mic alive in background)
    try {
      if (window.AudioBridge && typeof window.AudioBridge.startAudioService === 'function') {
        window.AudioBridge.startAudioService();
      }
    } catch (e) { console.log('AudioBridge not available:', e); }
    startListening();
  } else {
    try {
      if (window.AudioBridge && typeof window.AudioBridge.stopAudioService === 'function') {
        window.AudioBridge.stopAudioService();
      }
    } catch (e) { console.log('AudioBridge not available:', e); }
    stopListening();
  }
};

document.getElementById('sendBtn').onclick = () => { unlockTTS(); sendUser(textInput.value); textInput.value = ''; };
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { unlockTTS(); sendUser(textInput.value); textInput.value = ''; }
});

// Navigation click handlers
navHosts.onclick = () => showPage('hosts');
navSessions.onclick = () => showPage('sessions');
navChat.onclick = () => showPage('chat');
</script>
